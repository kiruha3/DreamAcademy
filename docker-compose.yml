version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: dd_academy_db
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlesecret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - academy_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  moodle:
    image: bitnami/moodle:4.4
    container_name: dd_academy_moodle
    environment:
      MOODLE_DATABASE_HOST: db
      MOODLE_DATABASE_NAME: moodle
      MOODLE_DATABASE_USER: moodle
      MOODLE_DATABASE_PASSWORD: moodlesecret
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: AdminPass123!
      MOODLE_EMAIL: admin@dreamdocs.local
      MOODLE_SITE_NAME: "DreamDocs Academy"
      MOODLE_HOST: localhost
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
    networks:
      - academy_net

  portal-backend:
    build: ./portal/backend
    container_name: dd_academy_backend
    environment:
      - MOODLE_URL=http://moodle:8080
      - MOODLE_TOKEN=${MOODLE_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      - moodle
    networks:
      - academy_net
    volumes:
      - ./portal/backend/app:/app/app

volumes:
  db_data:
  moodle_data:
  moodledata_data:

networks:
  academy_net:
